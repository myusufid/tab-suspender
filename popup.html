<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tab Suspender Settings</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: #333;
    }

    .setting {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #555;
    }

    input[type="number"],
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 13px;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #4CAF50;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    button:hover {
      background-color: #45a049;
    }

    .info {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .status {
      padding: 8px;
      margin-bottom: 12px;
      border-radius: 4px;
      text-align: center;
      font-size: 13px;
      display: none;
    }

    .status.success {
      background-color: #d4edda;
      color: #155724;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Tab Suspender</h1>

  <div id="status" class="status"></div>

  <div class="setting">
    <div class="toggle-container">
      <label>Enable Auto-Suspend</label>
      <label class="switch">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="setting">
    <label for="suspendTime">Suspend after (minutes)</label>
    <input type="number" id="suspendTime" min="1" max="1440" value="10">
    <div class="info">Tabs inactive for this long will be suspended</div>
  </div>

  <div class="setting">
    <label for="whitelist">Whitelist (one URL pattern per line)</label>
    <textarea id="whitelist" placeholder="example.com&#10;*.google.com&#10;localhost:*"></textarea>
    <div class="info">These URLs will never be suspended</div>
  </div>

  <button id="save">Save Settings</button>

  <script src="popup.js"></script>
</body>
</html>
